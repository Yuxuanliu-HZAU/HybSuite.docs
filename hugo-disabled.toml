baseURL = "https://Yuxuanliu-HZAU.github.io/HybSuite.docs/"
title = "HybSuite Documentation"

contentDir = "content/en"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

enableRobotsTXT = true
enableGitInfo = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "tango"

[outputs]
section = ["HTML", "print"]

[params]
description = "Tutorials and documentation for HybSuite"

github_repo = "https://github.com/Yuxuanliu-HZAU/HybSuite"
github_project_repo = "https://github.com/Yuxuanliu-HZAU/HybSuite"
github_branch = "main"

version = "1.1.6"
archived_version = false
url_latest_version = "https://Yuxuanliu-HZAU.github.io/HybSuite.docs/"

[params.ui]
navbar_logo = true
sidebar_menu_compact = false
sidebar_search_disable = false
breadcrumb_disable = false
enableRtl = false

[module]
  workspace = "docsy.work"

  [module.hugoVersion]
    extended = true
    min = "0.155.0"

  [[module.imports]]
    path = "github.com/google/docsy"
